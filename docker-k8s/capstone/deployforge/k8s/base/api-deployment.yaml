# DeployForge — API Gateway Deployment
# Introduced in Module 04 (Pods, Deployments, ReplicaSets)
#
# Module progression:
#   Module 04 — Basic deployment with probes
#   Module 05 — ConfigMap + Secret env refs, Ingress
#   Module 07 — SecurityContext, RBAC, NetworkPolicy
#   Module 08 — Prometheus annotations for scraping
#   Module 09 — Rolling update strategy tuning

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: deployforge
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: deployforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: deployforge
      # TODO Module 08: Add Prometheus scrape annotations
      # annotations:
      #   prometheus.io/scrape: "true"
      #   prometheus.io/port: "3000"
      #   prometheus.io/path: "/metrics"
    spec:
      # Pod anti-affinity: spread API pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: api
                topologyKey: kubernetes.io/hostname

      # TODO Module 07: Add securityContext
      # securityContext:
      #   runAsNonRoot: true
      #   runAsUser: 1000
      #   fsGroup: 1000

      containers:
        - name: api
          image: deployforge/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            # TODO Module 05: Reference ConfigMap and Secret
            # - name: DATABASE_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: deployforge-secrets
            #       key: database-url
            # - name: REDIS_URL
            #   valueFrom:
            #     configMapKeyRef:
            #       name: deployforge-config
            #       key: redis-url

          # Liveness — restart if the process is wedged
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          # Readiness — stop routing traffic if not ready
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2

          # Resource requests and limits
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
