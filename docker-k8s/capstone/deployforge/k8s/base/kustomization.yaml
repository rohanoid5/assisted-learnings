  # TODO Module 05: Add secret.yaml (or ExternalSecret in Module 07)
  # TODO Module 05: Add ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: deployforge
  app.kubernetes.io/managed-by: kustomize
