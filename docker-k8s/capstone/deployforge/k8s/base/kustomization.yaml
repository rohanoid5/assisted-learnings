# DeployForge — Kustomize Base
# Introduced in Module 04 (Kubernetes fundamentals)
#
# All raw manifests live here. Overlays (dev, staging, prod) patch these
# with environment-specific values.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: deployforge

resources:
  - namespace.yaml
  - api-deployment.yaml
  - api-service.yaml
