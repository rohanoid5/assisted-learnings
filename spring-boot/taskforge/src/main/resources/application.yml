server:
  port: 8080

spring:
  application:
    name: taskforge
  profiles:
    active: dev    # Default active profile

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  info:
    env:
      enabled: true

info:
  app:
    name: TaskForge
    description: Project Management API
    version: 1.0.0